name: Setup Demo Issues

on:
  workflow_dispatch:

jobs:
  create-issues:
    name: Create demo issues
    runs-on: ubuntu-latest
    permissions:
      issues: write

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}

    steps:
      - name: Create labels
        run: |
          gh label create "init-demo"    --repo "$REPO" --color "D93F0B" --description "Initial demo setup tasks"         --force
          gh label create "coding-agent" --repo "$REPO" --color "0E8A16" --description "Assigned to GitHub Coding Agent"  --force
          gh label create "copilot-cli"  --repo "$REPO" --color "1D76DB" --description "Assigned to Copilot CLI"          --force
          gh label create "agent-mode"   --repo "$REPO" --color "5319E7" --description "Assigned to Agent Mode in IDE"    --force
          gh label create "post-demo"    --repo "$REPO" --color "FBCA04" --description "Post-demo cleanup tasks"          --force

      - name: Check if demo issues already exist
        id: check
        run: |
          FOUND=$(gh issue list --repo "$REPO" --state all --search "Azure Static Web App Setup in:title" --json number --jq 'length')
          if [ "$FOUND" -gt 0 ]; then
            echo "Demo issues already exist. To re-create, close/delete existing demo issues first."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Issue 1 — Azure Static Web App Setup
        if: steps.check.outputs.skip == 'false'
        run: |
          cat > /tmp/body.md <<'EOF'
          ## Task
          Create an Azure Static Web App and deploy the repo to it.

          ### Steps
          1. `az login`
          2. `az group create --name <rg-name> --location <region>`
          3. `az staticwebapp create --name <app-name> --resource-group <rg-name> --location <region> --sku Free`
             > The repo already contains `.github/workflows/azure-static-web-apps.yml`. Do **not** use `--login-with-github` (it would create a second workflow and a randomly-named secret).
          4. `az staticwebapp secrets list --name <app-name> --resource-group <rg-name> --query "properties.apiKey" -o tsv`
          5. `gh secret set AZURE_STATIC_WEB_APPS_API_TOKEN --body "<token>"`
          6. `gh workflow run "Azure Static Web Apps CI/CD"`
          7. Verify the live URL: `az staticwebapp show --name <app-name> --resource-group <rg-name> --query "defaultHostname" -o tsv`
          8. Update `azure_resource.md` with the actual resource details, commit and push.
          EOF
          sed -i 's/^          //' /tmp/body.md
          gh issue create --repo "$REPO" --label "init-demo" --title "Azure Static Web App Setup" --body-file /tmp/body.md

      - name: Issue 2 — Scaffold and Beautify the Home Page
        if: steps.check.outputs.skip == 'false'
        run: |
          cat > /tmp/body.md <<'EOF'
          ## Task
          Scaffold and beautify the existing `index.html` as a **GitHub Copilot Across Surfaces** overview page with:
          - Title: **GitHub Copilot Across Surfaces**
          - A brief introduction explaining the four Copilot surfaces (GitHub.com, IDE, CLI, SDK)
          - Two navigation buttons that link to the child pages:
            - **Primitives** → `primitives.html`
            - **Agentic Platform Engineering** → `ape.html`

          Source reference: https://www.dailydoseofghcp.com/posts/ghcp-across-multiple-surfaces.html

          The blank HTML files (`index.html`, `primitives.html`, `ape.html`) already exist in the repo — no need to create the folder structure.

          ## Assigned to
          GitHub Coding Agent — assign this issue to Copilot via the Assignees panel on GitHub.com.
          EOF
          sed -i 's/^          //' /tmp/body.md
          gh issue create --repo "$REPO" --label "coding-agent" --title "Scaffold and Beautify the Home Page" --body-file /tmp/body.md

      - name: Issue 3 — Primitives Page
        if: steps.check.outputs.skip == 'false'
        run: |
          cat > /tmp/body.md <<'EOF'
          ## Task
          Build a child page for the GitHub Copilot Customization Primitives.

          The page should follow the same structure and style as the home page (`index.html`).
          Use `template-primitives.txt` in the repo root for the content — the eight primitives of GitHub Copilot customization.

          Source reference: https://github.com/microsoftnorman/customize-your-repo-with-github-copilot

          ## Assigned to
          Copilot CLI — use `gh copilot suggest` from the terminal to scaffold this page.

          ## Completion
          Once the page is built:
          1. Commit the changes
          2. Pull and rebase from remote: `git pull --rebase origin main`
          3. Push to remote: `git push origin main`
          4. Close this issue from the GitHub UI or with `gh issue close <this-issue-number>`
          EOF
          sed -i 's/^          //' /tmp/body.md
          gh issue create --repo "$REPO" --label "copilot-cli" --title "Primitives Page" --body-file /tmp/body.md

      - name: Issue 4 — Agentic Platform Engineering Page
        if: steps.check.outputs.skip == 'false'
        run: |
          cat > /tmp/body.md <<'EOF'
          ## Task
          Build a child page for Agentic Platform Engineering (APE).

          The page should follow the same structure and style as the home page and Primitives page.
          Use `template-ape.txt` in the repo root for the content — the Git-Ape multi-agent framework (deployment flow, agents, skills, execution modes).

          Source reference: https://github.com/Azure/git-ape

          ## Assigned to
          Agent Mode in IDE (VS Code) — use Copilot Chat in Agent Mode, referencing the existing pages for structure.

          ## Completion
          When the APE page is complete:
          1. Commit the changes
          2. Pull and rebase from remote: `git pull --rebase origin main`
          3. Resolve any merge conflicts if they arise
          4. Push to remote: `git push origin main`
          5. Close this issue from the GitHub UI or with `gh issue close <this-issue-number>`
          EOF
          sed -i 's/^          //' /tmp/body.md
          gh issue create --repo "$REPO" --label "agent-mode" --title "Agentic Platform Engineering Page" --body-file /tmp/body.md

      - name: Issue 5 — Azure Deployment
        if: steps.check.outputs.skip == 'false'
        run: |
          cat > /tmp/body.md <<'EOF'
          ## Task
          The application is already deployed to Azure Static Web Apps and a CI/CD workflow is in place (`.github/workflows/azure-static-web-apps.yml`).

          > ⚠️ **Important**: The workflow only triggers on `workflow_dispatch` — **not on push**. Do NOT push to remote expecting a deployment. Trigger it manually with:
          > ```bash
          > gh workflow run "Azure Static Web Apps CI/CD"
          > ```

          For this step:
          1. Confirm the **Azure Static Web App Setup**, **Home Page**, **Primitives Page**, and **APE Page** issues are closed
          2. Verify the latest changes are live at the deployed URL
          3. If anything needs to be re-triggered, trigger the workflow manually using the command above

          > ⚠️ **Prerequisite**: The **Home Page**, **Primitives**, and **APE** issues must be closed before deployment. The **Code Review and Performance** issue happens after this step.

          ## Assigned to
          Agent Mode in IDE (VS Code) — prompt: *'The Home Page, Primitives, and APE issues are resolved. Verify the app is deployed and the live site reflects all the latest changes. Trigger a re-deployment if needed.'*

          ## Pre-flight requirement
          The presenter must have already completed the **Azure Static Web App Setup** issue:
          - Azure Static Web App created and connected to this repository
          - `AZURE_STATIC_WEB_APPS_API_TOKEN` added to the repository secrets

          ## Completion
          Once deployment is verified and the live site is confirmed working, close this issue from the GitHub UI or with `gh issue close <this-issue-number>`.
          EOF
          sed -i 's/^          //' /tmp/body.md
          gh issue create --repo "$REPO" --label "agent-mode" --title "Azure Deployment" --body-file /tmp/body.md

      - name: Issue 6 — Code Review and Performance
        if: steps.check.outputs.skip == 'false'
        run: |
          cat > /tmp/body.md <<'EOF'
          ## Task
          Perform a code review of the full application (targeting the live deployed app):

          1. **Code quality review** — focus on best practices, error handling, accessibility
          2. **Performance review** — focus on asset optimization, render-blocking resources, caching

          The findings from each review should be filed as four new GitHub issues using `gh issue create`, **in this exact order so that "Deploy latest version to Azure" is the last issue created**:
          1. Fix: missing alt attributes and semantic HTML
          2. Fix: render-blocking CSS and missing meta tags
          3. Write and run unit tests for the application
          4. Deploy latest version to Azure (trigger the existing workflow with `gh workflow run "Azure Static Web Apps CI/CD"`) — **must be filed last**

          After filing the issues, generate a `suggested_improvements.md` report in the repo root summarizing all findings and recommendations from the review.

          ## Assigned to
          Copilot CLI — review the codebase, file the issues, generate the report.

          ## Note
          This step happens after the **Azure Deployment** issue. The reviews target the live deployed app.

          ## Completion
          Once the issues are created, the report is generated, and changes are committed and pushed, close this issue from the GitHub UI or with `gh issue close <this-issue-number>`.
          EOF
          sed -i 's/^          //' /tmp/body.md
          gh issue create --repo "$REPO" --label "copilot-cli" --title "Code Review and Performance" --body-file /tmp/body.md

      - name: Issue 7 — Clean Up Azure Resources
        if: steps.check.outputs.skip == 'false'
        run: |
          cat > /tmp/body.md <<'EOF'
          ## Task
          After the demo is complete, delete all Azure resources to avoid unnecessary costs.

          ### Steps
          1. Go to the [Azure Portal](https://portal.azure.com)
          2. Navigate to the **Resource Group** created for this demo
          3. Click **Delete resource group** and confirm
          4. Verify the Static Web App and any associated resources are fully removed

          > ⚠️ Only do this after the demo is fully complete and you no longer need the live URL.
          EOF
          sed -i 's/^          //' /tmp/body.md
          gh issue create --repo "$REPO" --label "post-demo" --title "Clean Up Azure Resources" --body-file /tmp/body.md
